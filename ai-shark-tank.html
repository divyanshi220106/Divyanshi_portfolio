
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shark Tank Simulator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#06b6d4;
color:white;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.judge{
padding:15px;
background:#334155;
margin-top:15px;
border-radius:10px;
}

.score{
font-size:22px;
font-weight:bold;
color:#22c55e;
}

.leaderboard-item{
padding:10px;
background:#334155;
margin-top:8px;
border-radius:8px;
}

@media(max-width:768px){
body{
padding:10px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>🦈 AI Shark Tank Simulator</h1>

<div class="card">

<h2>Startup Details</h2>

<input id="startupName" placeholder="Startup Name">

<textarea id="problem" placeholder="Problem Statement"></textarea>

<textarea id="solution" placeholder="Solution"></textarea>

<input id="revenue" placeholder="Revenue Model">

<input id="audience" placeholder="Target Audience">

<input id="funding" placeholder="Funding Ask">

<button onclick="startPitch()">
Start Shark Tank
</button>

</div>

<div id="pitchSection"></div>

<div id="resultSection"></div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>
</div>

</div>

<script>

const judges = [

{
name:"🦈 Venture Capitalist",
questions:[
"How large is your target market?",
"How will you scale globally?"
]
},

{
name:"🦈 Founder",
questions:[
"What is your execution strategy?",
"What competitive advantage do you have?"
]
},

{
name:"🦈 Customer",
questions:[
"Why would customers use this?",
"What pain point are you solving?"
]
},

{
name:"🦈 Angel Investor",
questions:[
"When do you become profitable?",
"How will you generate recurring revenue?"
]
}

];

function startPitch(){

let name=document.getElementById("startupName").value;

let pitch=document.getElementById("pitchSection");

pitch.innerHTML=`
<div class="card">
<h2>${name} Pitch Session</h2>
</div>
`;

judges.forEach(judge=>{

let html=`
<div class="judge">
<h3>${judge.name}</h3>

<p>Q1: ${judge.questions[0]}</p>
<textarea placeholder="Answer"></textarea>

<p>Q2: ${judge.questions[1]}</p>
<textarea placeholder="Answer"></textarea>

<p>Reaction:
${generateReaction()}
</p>
</div>
`;

pitch.innerHTML+=html;

});

pitch.innerHTML+=`
<br>
<button onclick="calculateResult()">
Generate Investment Decision
</button>
`;

}

function generateReaction(){

const reactions=[
"Interesting opportunity.",
"Strong potential.",
"Needs more validation.",
"Impressive vision.",
"Profitability concerns."
];

return reactions[
Math.floor(Math.random()*reactions.length)
];

}

function calculateResult(){

let market=random(60,100);
let innovation=random(60,100);
let model=random(60,100);
let execution=random(60,100);
let investment=random(60,100);

let total=Math.round(
(market+innovation+model+execution+investment)/5
);

let decision;

if(total>=85){
decision="✅ INVEST";
launchConfetti();
}
else if(total>=70){
decision="⏳ COME BACK LATER";
}
else if(total>=50){
decision="❌ REJECT";
}
else{
decision="🏢 ACQUIRE";
}

let valuation=(total*100000).toLocaleString();

document.getElementById("resultSection").innerHTML=`

<div class="card">

<h2>Investment Scorecard</h2>

<p>Market Potential: ${market}</p>
<p>Innovation: ${innovation}</p>
<p>Business Model: ${model}</p>
<p>Execution: ${execution}</p>
<p>Investment Worthiness: ${investment}</p>

<h2 class="score">
Total Score: ${total}/100
</h2>

<h2>${decision}</h2>

<p>Suggested Valuation:
$${valuation}
</p>

<p>Funding Recommendation:
$${Math.round(total*5000).toLocaleString()}
</p>

<p>
Reasoning:
Based on overall startup attractiveness,
scalability, execution readiness and investor confidence.
</p>

<br>

<button onclick="downloadReport()">
Download Pitch Report
</button>

<button onclick="shareResult()">
Share Result
</button>

</div>

`;

saveLeaderboard(total);

}

function random(min,max){
return Math.floor(
Math.random()*(max-min+1)
)+min;
}

function saveLeaderboard(score){

let board=
JSON.parse(
localStorage.getItem("leaderboard")
)||[];

board.push({
name:document.getElementById("startupName").value,
score
});

board.sort((a,b)=>b.score-a.score);

localStorage.setItem(
"leaderboard",
JSON.stringify(board)
);

loadLeaderboard();

}

function loadLeaderboard(){

let board=
JSON.parse(
localStorage.getItem("leaderboard")
)||[];

let html="";

board.slice(0,10).forEach(item=>{

html+=`
<div class="leaderboard-item">
${item.name} - ${item.score}
</div>
`;

});

document.getElementById(
"leaderboard"
).innerHTML=html;

}

function downloadReport(){

let text=
document.getElementById("resultSection")
.innerText;

let blob=new Blob([text],{
type:"text/plain"
});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Pitch_Report.txt";

a.click();

}

function shareResult(){

navigator.clipboard.writeText(
document.getElementById("resultSection").innerText
);

alert("Result copied!");
}

function launchConfetti(){

for(let i=0;i<100;i++){

let div=document.createElement("div");

div.style.position="fixed";
div.style.width="8px";
div.style.height="8px";
div.style.background=
`hsl(${Math.random()*360},100%,50%)`;

div.style.left=
Math.random()*100+"vw";

div.style.top="-10px";

div.style.zIndex="999";

document.body.appendChild(div);

let pos=0;

let interval=setInterval(()=>{

pos+=5;

div.style.top=pos+"px";

if(pos>window.innerHeight){
clearInterval(interval);
div.remove();
}

},20);

}

}

loadLeaderboard();

</script>

</body>
</html>
```
