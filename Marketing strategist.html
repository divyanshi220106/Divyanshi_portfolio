<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0A0C12;
    --bg-2:#0E1119;
    --surface:#131722;
    --surface-2:#1A1F2C;
    --surface-3:#212739;
    --border:#262C3D;
    --border-soft:#1D2233;
    --text:#E9EBF2;
    --muted:#8A93A8;
    --muted-2:#5D6478;
    --mint:#6EE7C8;
    --mint-dim:#3A6F63;
    --amber:#F5A94E;
    --coral:#FF7A7A;
    --violet:#A78BFA;
    --display:'Space Grotesk', system-ui, sans-serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(110,231,200,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(167,139,250,0.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;}
  ::selection{background:var(--mint); color:#08110E;}

  .app-shell{max-width:1080px; margin:0 auto; padding:28px 22px 90px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; gap:16px; flex-wrap:wrap;}
  .brandmark{display:flex; align-items:center; gap:10px; font-family:var(--display); font-weight:600; letter-spacing:0.01em; color:var(--text); font-size:15px;}
  .brandmark .dot{width:9px; height:9px; border-radius:2px; background:var(--mint); transform:rotate(45deg); flex:none;}
  .session-tag{font-family:var(--mono); font-size:11px; color:var(--muted-2); border:1px solid var(--border); padding:5px 10px; border-radius:20px; letter-spacing:0.03em;}

  /* Step rail */
  .rail{display:flex; align-items:center; gap:0; margin-bottom:34px; overflow-x:auto; padding-bottom:4px;}
  .rail::-webkit-scrollbar{height:4px;}
  .rail-step{display:flex; align-items:center; gap:8px; flex:none;}
  .rail-num{
    width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:11px; border:1px solid var(--border); color:var(--muted-2);
    transition:all .35s ease; flex:none; background:var(--surface);
  }
  .rail-num.active{border-color:var(--mint); color:var(--mint); box-shadow:0 0 0 3px rgba(110,231,200,0.12);}
  .rail-num.done{background:var(--mint); border-color:var(--mint); color:#08110E;}
  .rail-label{font-size:11px; color:var(--muted-2); white-space:nowrap; display:none;}
  .rail-line{width:26px; height:1px; background:var(--border); flex:none;}
  .rail-line.done{background:var(--mint-dim);}
  @media(min-width:720px){ .rail-label{display:inline;} .rail-line{width:36px;} }

  .fade-in{animation:fadeIn .5s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .card{
    background:linear-gradient(180deg, var(--surface), var(--bg-2));
    border:1px solid var(--border);
    border-radius:14px;
    padding:26px;
  }
  .card + .card{margin-top:18px;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--mint); margin:0 0 10px;}
  h1.title{font-family:var(--display); font-size:clamp(28px,5vw,42px); line-height:1.08; margin:0 0 14px; font-weight:600;}
  h2.title{font-family:var(--display); font-size:clamp(22px,3.6vw,28px); line-height:1.15; margin:0 0 10px; font-weight:600;}
  h3.title{font-family:var(--display); font-size:18px; margin:0 0 8px; font-weight:600;}
  p.lead{color:var(--muted); font-size:15.5px; line-height:1.65; max-width:640px;}
  .why-box{
    margin-top:16px; border-left:2px solid var(--mint-dim); padding:10px 0 10px 16px;
    color:var(--muted); font-size:14px; line-height:1.6;
  }
  .why-box b{color:var(--text); font-weight:600;}

  button{font-family:var(--body); cursor:pointer;}
  .btn{
    background:var(--mint); color:#08110E; border:none; padding:13px 22px; border-radius:9px;
    font-weight:600; font-size:14.5px; transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-1px); box-shadow:0 6px 20px rgba(110,231,200,0.18);}
  .btn:disabled{opacity:.35; cursor:not-allowed; transform:none; box-shadow:none;}
  .btn-ghost{
    background:transparent; color:var(--text); border:1px solid var(--border); padding:12px 20px; border-radius:9px;
    font-weight:500; font-size:14px; transition:border-color .15s ease, color .15s ease;
  }
  .btn-ghost:hover{border-color:var(--mint-dim); color:var(--mint);}
  .btn-row{display:flex; gap:12px; margin-top:26px; flex-wrap:wrap;}

  .choice-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-top:20px;}
  .choice-card{
    background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:20px;
    text-align:left; transition:all .18s ease; color:var(--text); display:flex; flex-direction:column; gap:8px;
  }
  .choice-card:hover{border-color:var(--mint-dim); transform:translateY(-2px);}
  .choice-card .icon{font-size:26px;}
  .choice-card .ck-title{font-family:var(--display); font-weight:600; font-size:16.5px;}
  .choice-card .ck-desc{color:var(--muted); font-size:13px; line-height:1.5;}

  input[type=text], textarea, select{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:11px 13px; border-radius:8px; font-family:var(--body); font-size:14.5px; margin-top:6px;
  }
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--mint-dim);}
  label.field-label{font-size:12.5px; color:var(--muted); font-weight:500; display:block; margin-top:16px;}
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 20px;}
  @media(max-width:640px){.field-grid{grid-template-columns:1fr;}}

  .tag{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10.5px; padding:4px 9px; border-radius:20px; border:1px solid var(--border); color:var(--muted);}
  .tag.strong{border-color:var(--mint-dim); color:var(--mint);}
  .tag.situational{border-color:#5a4a2a; color:var(--amber);}
  .tag.weak{border-color:#5a2f2f; color:var(--coral);}

  .platform-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin-top:20px;}
  .platform-card{
    background:var(--surface-2); border:1.5px solid var(--border); border-radius:12px; padding:18px;
    cursor:pointer; transition:all .18s ease;
  }
  .platform-card.selected{border-color:var(--mint); background:linear-gradient(180deg, rgba(110,231,200,0.08), var(--surface-2));}
  .platform-card .p-head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .platform-card .p-name{font-family:var(--display); font-weight:600; font-size:16px;}
  .platform-card .p-why{color:var(--muted); font-size:13px; line-height:1.55; margin-top:8px;}
  .check{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border); flex:none; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent;}
  .platform-card.selected .check{background:var(--mint); border-color:var(--mint); color:#08110E;}

  .pillar-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin-top:20px;}
  .pillar-card{background:var(--surface-2); border:1.5px solid var(--border); border-radius:12px; padding:18px; cursor:pointer; transition:all .18s ease; position:relative;}
  .pillar-card.selected{border-color:var(--violet); background:linear-gradient(180deg, rgba(167,139,250,0.08), var(--surface-2));}
  .pillar-card .pc-num{position:absolute; top:14px; right:16px; font-family:var(--mono); font-size:11px; color:var(--violet);}
  .pillar-card .pc-goal{margin-top:10px; font-family:var(--mono); font-size:11px; color:var(--muted-2); letter-spacing:0.03em;}
  .counter{font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:14px;}
  .counter b{color:var(--mint);}

  .week-row{display:flex; gap:16px; border-top:1px solid var(--border-soft); padding:18px 0;}
  .week-row:first-of-type{border-top:none;}
  .week-num{font-family:var(--display); font-size:26px; color:var(--muted-2); flex:none; width:64px;}
  .week-body .w-title{font-family:var(--display); font-weight:600; font-size:16px; margin-bottom:6px;}
  .week-body .w-goal{font-family:var(--mono); font-size:11px; color:var(--mint); letter-spacing:0.03em; text-transform:uppercase; margin-bottom:8px;}
  .week-body .w-strategy{color:var(--muted); font-size:14px; line-height:1.6;}

  .event-banner{
    border:1px solid #4a3420; background:linear-gradient(180deg, rgba(245,169,78,0.08), transparent);
    border-radius:12px; padding:20px; margin-bottom:4px;
  }
  .event-banner .ev-tag{font-family:var(--mono); font-size:11px; color:var(--amber); letter-spacing:0.06em; text-transform:uppercase;}
  .response-list{display:flex; flex-direction:column; gap:12px; margin-top:18px;}
  .response-card{
    background:var(--surface-2); border:1.5px solid var(--border); border-radius:12px; padding:16px 18px;
    text-align:left; transition:all .18s ease;
  }
  .response-card:hover{border-color:var(--mint-dim);}
  .response-card.chosen{border-color:var(--mint);}
  .consequence-box{
    margin-top:16px; padding:16px 18px; border-radius:10px; background:var(--surface-3); border:1px solid var(--border);
    font-size:14px; line-height:1.6; color:var(--text);
  }
  .consequence-box .cq-tag{font-family:var(--mono); font-size:10.5px; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:6px; display:block;}
  .cq-tag.good{color:var(--mint);}
  .cq-tag.risky{color:var(--coral);}

  .report-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:6px;}
  @media(max-width:720px){.report-grid{grid-template-columns:1fr;}}
  .report-cell{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:18px;}
  .report-cell .rc-label{font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted-2); margin-bottom:8px;}
  .report-cell.best{border-color:var(--mint-dim);}
  .report-cell.mistake{border-color:#4a2f2f;}
  .score-wrap{display:flex; align-items:center; gap:16px;}
  .score-num{font-family:var(--display); font-size:42px; font-weight:600; color:var(--mint);}
  .score-bar{flex:1; height:8px; background:var(--surface-3); border-radius:6px; overflow:hidden;}
  .score-fill{height:100%; background:linear-gradient(90deg, var(--mint-dim), var(--mint));}
  .lessons-list{list-style:none; margin:10px 0 0; padding:0; display:flex; flex-direction:column; gap:10px;}
  .lessons-list li{display:flex; gap:12px; font-size:14.5px; line-height:1.55; color:var(--text);}
  .lessons-list .lnum{font-family:var(--mono); color:var(--violet); flex:none;}

  .prompt-card{
    margin-top:20px; background:#0D1016; border:1px solid var(--border); border-radius:12px; overflow:hidden;
  }
  .prompt-head{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border-soft); background:var(--surface-2);}
  .prompt-head span{font-family:var(--mono); font-size:11.5px; color:var(--muted); letter-spacing:0.04em;}
  .copy-btn{background:transparent; border:1px solid var(--border); color:var(--muted); font-family:var(--mono); font-size:11px; padding:5px 10px; border-radius:6px; transition:all .15s ease;}
  .copy-btn:hover{border-color:var(--mint-dim); color:var(--mint);}
  .prompt-body{padding:16px; font-family:var(--mono); font-size:12.8px; line-height:1.7; color:#C9E8DF; white-space:pre-wrap;}

  .footer-nav{display:flex; justify-content:space-between; align-items:center; margin-top:34px; flex-wrap:wrap; gap:12px;}
  .replay-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:22px;}

  .mode-note{font-size:12px; color:var(--muted-2); margin-top:4px;}
  .pill-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
  .pill-list .pill{font-family:var(--mono); font-size:11.5px; padding:5px 11px; border-radius:20px; border:1px solid var(--border); color:var(--muted);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useMemo, useCallback} = React;

/* ---------------- DATA ---------------- */

const STEPS = [
  {key:'welcome', label:'Welcome'},
  {key:'mode', label:'Choose Path'},
  {key:'setup', label:'Know Your Audience'},
  {key:'platforms', label:'Platforms'},
  {key:'pillars', label:'Content Pillars'},
  {key:'roadmap', label:'30-Day Roadmap'},
  {key:'event', label:'Curveball'},
  {key:'report', label:'Growth Report'},
];

const RANDOM_CLIENTS = [
  {name:'Verdant & Co.', industry:'eco-friendly skincare', audience:'environmentally-conscious women 25-40 who already buy organic groceries but haven\'t switched their skincare routine', budget:'Small ($1,500/mo)', competitors:['The Ordinary', 'Herbivore Botanicals'], challenge:'Customers love the product once they try it, but the brand gets lost in a crowded, jargon-heavy "clean beauty" market.'},
  {name:'Ironclad Fitness Studio', industry:'boutique strength-training gym', audience:'busy professionals aged 28-45 who want structured workouts without designing their own program', budget:'Medium ($4,000/mo)', competitors:['F45 Training', 'local CrossFit box'], challenge:'Strong in-person retention, but almost zero visibility to people who haven\'t already walked past the storefront.'},
  {name:'Nomad Tabletop Games', industry:'indie board game publisher', audience:'hobbyist gamers 20-35 who back Kickstarter campaigns and follow tabletop reviewers', budget:'Small ($1,000/mo)', competitors:['Restoration Games', 'Renegade Game Studios'], challenge:'One viral TikTok two years ago created a spike that never turned into a repeatable growth engine.'},
  {name:'Rootline Meals', industry:'plant-based meal-kit subscription', audience:'time-poor parents 30-45 trying to eat healthier without extra effort', budget:'Medium ($6,000/mo)', competitors:['HelloFresh', 'Purple Carrot'], challenge:'Great retention once someone subscribes, but the free trial offer isn\'t reaching people before they give up on "eating better" resolutions.'},
  {name:'Fielder & Oak', industry:'handmade furniture workshop', audience:'first-time homeowners 30-50 who want one statement piece, not a whole house of flat-pack furniture', budget:'Small ($800/mo)', competitors:['West Elm', 'a local custom carpenter'], challenge:'The craftsmanship sells itself in photos, but the owner is camera-shy and avoids showing the process.'},
  {name:'Pathfinder Pet Tech', industry:'smart pet-tracking collar', audience:'dog owners 25-40 in cities who\'ve had a pet go missing or worry about it', budget:'Large ($15,000/mo)', competitors:['Whistle', 'Fi Smart Collar'], challenge:'Paid ads convert, but a recent battery-life complaint is spreading faster than the marketing team can respond to it.'},
  {name:'Lingohop', industry:'language-learning app for slang & culture', audience:'young travelers 18-27 who found textbook apps boring', budget:'Medium ($3,000/mo)', competitors:['Duolingo', 'Babbel'], challenge:'App downloads are healthy, but almost nobody opens the app past week one.'},
  {name:'Ember & Bean', industry:'local coffee roastery', audience:'neighborhood regulars 22-55 who care where their coffee comes from', budget:'Small ($500/mo)', competitors:['Blue Bottle Coffee', 'a chain café two blocks away'], challenge:'Beloved in person, but the online presence hasn\'t been touched in over a year.'},
  {name:'Loop Wardrobe', industry:'sustainable clothing rental', audience:'fashion-forward professionals 24-38 tired of fast fashion but not ready to buy secondhand', budget:'Medium ($5,000/mo)', competitors:['Rent the Runway', 'Nuuly'], challenge:'The concept confuses new visitors — most people bounce before understanding how the rental cycle works.'},
  {name:'Compass Coin', industry:'financial-literacy course for young adults', audience:'recent graduates 21-26 starting their first job with no budgeting habits', budget:'Small ($1,200/mo)', competitors:['a popular finance YouTuber', 'Ramit Sethi\'s course'], challenge:'The founder is a great teacher, but the brand feels like "homework" instead of something people want to open.'},
];

const PLATFORM_INFO = [
  {key:'Instagram', icon:'◈',
    business:{fit:'strong', why:'Visual product or in-person moments (studio, workshop, unboxing) translate well here, and shopping tags shorten the path to purchase.'},
    personal:{fit:'situational', why:'Good for behind-the-scenes and story content, but it rewards visuals over expertise — useful as a supporting channel, not the main stage.'}},
  {key:'TikTok', icon:'▶',
    business:{fit:'situational', why:'Huge reach potential if the product is visually demonstrable, but it demands constant output and rewards entertainment over polish.'},
    personal:{fit:'situational', why:'Can spread a POV fast, but the algorithm favors volume and trends, which is exhausting to sustain solo without a content system.'}},
  {key:'Facebook', icon:'▣',
    business:{fit:'situational', why:'Strong for local businesses and community groups, especially with an older or hyper-local audience; weaker for pure discovery.'},
    personal:{fit:'weak', why:'Organic reach for individuals is low, and the audience skews toward existing personal connections rather than new followers.'}},
  {key:'X / Twitter', icon:'✕',
    business:{fit:'weak', why:'Useful for customer service and real-time updates, but it rarely drives new customer discovery for most product categories.'},
    personal:{fit:'strong', why:'Ideal for sharing opinions in public, joining live conversations, and building a reputation among peers in a specific niche.'}},
  {key:'LinkedIn', icon:'⬒', 
    business:{fit:'situational', why:'Effective for B2B products or hiring-adjacent visibility; less useful if customers are everyday consumers scrolling for products.'},
    personal:{fit:'strong', why:'The default home for professional credibility — long-form thinking, career milestones, and industry commentary all perform well.'}},
  {key:'YouTube', icon:'▷',
    business:{fit:'situational', why:'Great for tutorials, demos, and reviews that build trust over time, but requires a real production commitment to see returns.'},
    personal:{fit:'strong', why:'Long-form video builds deeper trust than any other platform — it is where expertise turns into an audience that remembers your name.'}},
  {key:'Pinterest', icon:'⬡',
    business:{fit:'situational', why:'A hidden gem for visual, aspirational, or how-to products — but it is a search engine, not a social feed, so growth is slower and steadier.'},
    personal:{fit:'weak', why:'Pinterest users search for ideas and products, not people — a personal brand rarely gets discovered here.'}},
  {key:'Newsletter / Email', icon:'✉',
    business:{fit:'strong', why:'The only channel you fully own — no algorithm between you and the customer, and it compounds every month you keep sending it.'},
    personal:{fit:'strong', why:'The most durable trust-builder for a personal brand — it turns casual followers into a real, portable audience.'}},
];

const PILLARS_BUSINESS = [
  {name:'Educational', desc:'Teach the audience something useful related to the problem your product solves.', goal:'Builds trust & SEO'},
  {name:'Behind the Scenes', desc:'Show the making-of: process, people, workspace, imperfections included.', goal:'Builds relatability'},
  {name:'Social Proof', desc:'Customer stories, reviews, before/afters, real results.', goal:'Reduces buying doubt'},
  {name:'Promotional', desc:'Direct offers, launches, and calls-to-action.', goal:'Drives conversions'},
  {name:'Entertainment', desc:'Humor, trends, or culture relevant to your audience\'s world.', goal:'Grows reach & shares'},
  {name:'Community-Building', desc:'Q&As, polls, user-generated content, replying in public.', goal:'Builds loyalty'},
];

const PILLARS_PERSONAL = [
  {name:'Thought Leadership', desc:'Share a real opinion or framework from your area of expertise.', goal:'Builds authority'},
  {name:'Personal Story', desc:'The path that led you here — wins, failures, turning points.', goal:'Builds connection'},
  {name:'Behind the Scenes', desc:'What your actual day/work looks like, unfiltered.', goal:'Builds relatability'},
  {name:'Audience Education', desc:'Teach one concrete, useful thing your audience can apply today.', goal:'Builds trust'},
  {name:'Wins & Lessons', desc:'Document what worked, what flopped, and what you\'d do differently.', goal:'Builds credibility'},
  {name:'Community Q&A', desc:'Answer real questions from your audience, publicly.', goal:'Builds loyalty'},
];

const EVENTS_BUSINESS = [
  {title:'A Competitor Undercuts Your Price', desc:'A close competitor just launched a near-identical product at 30% less. Your customers are starting to ask why they should still pick you.',
   choices:[
     {label:'Match the price cut immediately', quality:'risky', consequence:'Short-term sales hold steady, but margins shrink and the brand starts competing on price instead of value — a race with no finish line.'},
     {label:'Double down on the story only you can tell (quality, origin, values) instead of price', quality:'good', consequence:'A few price-sensitive customers leave, but the ones who stay become more loyal, and the brand differentiates instead of blending in.'},
     {label:'Say nothing and hope it blows over', quality:'risky', consequence:'Silence reads as having no answer. Customers quietly start comparing you unfavorably, and the competitor\'s narrative wins by default.'},
   ]},
  {title:'One Post Unexpectedly Goes Viral', desc:'A low-effort post you almost didn\'t publish just crossed 500,000 views overnight. Your inbox and comments are flooded.',
   choices:[
     {label:'Reply to comments and point people to one clear next step', quality:'good', consequence:'A meaningful share of the new attention converts into followers and customers, because you gave them somewhere to go.'},
     {label:'Post five more similar videos back-to-back hoping to repeat it', quality:'risky', consequence:'The follow-ups underperform and dilute the original moment — virality rarely repeats on command, and the account looks like it\'s chasing a fluke.'},
     {label:'Do nothing differently and wait for the next post to do the same', quality:'risky', consequence:'The spike fades with no funnel behind it. Followers gained never convert because there was no next step for them.'},
   ]},
  {title:'A Complaint Goes Public', desc:'A customer\'s frustrated comment about a shipping delay has picked up dozens of likes and replies, some from people who\'ve never bought from you.',
   choices:[
     {label:'Delete the comment', quality:'risky', consequence:'Screenshots spread anyway, now with "they deleted it" attached — the story gets worse, not smaller.'},
     {label:'Reply publicly, own the issue, and move details to a direct message', quality:'good', consequence:'Onlookers see a brand that takes responsibility. Trust with new visitors actually increases, even though the original issue was real.'},
     {label:'Ignore it and let it scroll away', quality:'risky', consequence:'It doesn\'t scroll away fast enough — new visitors landing on the profile see an unanswered complaint at the top of the comments.'},
   ]},
  {title:'The Marketing Budget Gets Cut 30% Mid-Campaign', desc:'Leadership just trimmed next month\'s spend with no warning, and a campaign is already halfway live.',
   choices:[
     {label:'Cut paid ads first, protect the organic content plan', quality:'good', consequence:'Reach dips slightly but the content pillars and audience relationship keep compounding — the cheapest, most durable growth engine survives.'},

function randomOf(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function fitRank(fit){ return fit==='strong'?2:fit==='situational'?1:0; }

function buildRoadmap(mode, pillars, platformNames, name){
  const p = pillars.map(p=>p.name);
  const plat = platformNames.join(' and ') || 'your chosen platforms';
  if(mode==='personal'){
    return [
      {title:'Define Your POV & Optimize Your Profile', goal:'Foundation', strategy:`Rewrite your bio on ${plat} so a stranger understands your niche in five seconds. Publish 2-3 ${p[0] || 'Thought Leadership'} posts that state a clear point of view — this is the week people decide whether to follow you.`},
      {title:'Prove You Know What You\'re Talking About', goal:'Credibility', strategy:`Lean into ${p[1] || 'Audience Education'} content — teach one real, specific thing per post. Mix in a ${p[0]||'Personal Story'} piece so the audience learns the person, not just the expertise.`},
      {title:'Turn Viewers Into a Real Audience', goal:'Trust & reach', strategy:`Post consistently on ${plat}, reply to every comment personally, and start collecting emails through a simple newsletter signup — this is the week you start owning the relationship instead of renting it from an algorithm.`},
      {title:'Reflect, Double Down, Repeat', goal:'Momentum', strategy:`Look at which ${p[2]||'Wins & Lessons'} posts performed best, and plan next month around more of that — personal brands grow by repeating what already resonated, not by reinventing weekly.`},
    ];
  }
  return [
    {title:'Foundation & Awareness', goal:'Visibility', strategy:`Set up or clean up your presence on ${plat}. Publish ${p[0]||'Educational'} content that introduces the problem you solve — most people don\'t know you exist yet, so this week is about being findable.`},
    {title:'Build Trust', goal:'Credibility', strategy:`Mix in ${p[1]||'Social Proof'} content — real customer results or behind-the-scenes proof that the product works as promised.`},
    {title:'Drive Engagement', goal:'Community', strategy:`Ask questions, run a poll, or respond publicly to comments to build a sense of momentum around ${name || 'the brand'} — engagement signals tell the algorithm and new visitors that real people are here.`},
    {title:'Convert & Review', goal:'Conversion', strategy:`Introduce a clear ${p[2]||'Promotional'} push with one specific call-to-action, then review which posts earned the most engagement to carry into next month\'s plan.`},
  ];
}

function scorePlatform(p, mode){
  return p.fitTag ? fitRank(p.fitTag) : 0;
}

function StepRail({activeIndex}){

          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>

              {i<activeIndex ? '✓' : i}
            </div>
            <span className="rail-label">{s.label}</span>
          </div>
          {i<STEPS.length-1 && <div className={"rail-line "+(i<activeIndex?'done':'')}></div>}
        </div>
      ))}
    </div>

function PromptCard({label, prompt}){
  const [copied,setCopied] = useState(false);
  const onCopy = ()=>{
    const ta = document.createElement('textarea');
    ta.value = prompt; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    setCopied(true); setTimeout(()=>setCopied(false), 1500);
  };
  return (
    <div className="prompt-card">
      <div className="prompt-head">
        <span>◇ HOW TO ASK CLAUDE — {label}</span>
        <button className="copy-btn" onClick={onCopy}>{copied?'Copied ✓':'Copy prompt'}</button>
      </div>
      <div className="prompt-body">{prompt}</div>
    </div>
  );
}

function ReportScreen({mode, brand, platforms, pillars, roadmap, event, eventChoice, onReplay}){
  const modeKey = mode==='personal'?'personal':'business';

  const platformScore = platforms.reduce((sum,key)=>{
    const info = PLATFORM_INFO.find(p=>p.key===key);
    const fit = info ? info[modeKey].fit : 'situational';
    return sum + (fit==='strong'?14:fit==='situational'?4:-10);
  },0);
  const chosen = event.choices[eventChoice];
  const eventScore = chosen.quality==='good' ? 16 : -8;
  const rawScore = 50 + platformScore + eventScore;
  const score = Math.max(6, Math.min(97, rawScore));
  const rating = score<40?'Fragile Start':score<60?'Building Momentum':score<80?'Strong Trajectory':'Breakout Potential';

  const bestPlatform = platforms
    .map(key=>({key, info:PLATFORM_INFO.find(p=>p.key===key)[modeKey]}))
    .filter(x=>x.info.fit==='strong')[0];
  const weakPlatform = platforms
    .map(key=>({key, info:PLATFORM_INFO.find(p=>p.key===key)[modeKey]}))
    .find(x=>x.info.fit==='weak');

  const bestDecision = chosen.quality==='good'
    ? `Your response to "${event.title}" — ${chosen.label.toLowerCase()} — protected trust instead of chasing a short-term fix.`
    : bestPlatform
      ? `Choosing ${bestPlatform.key} was your strongest call — ${bestPlatform.info.why.toLowerCase()}`
      : `Narrowing to just ${platforms.length} platform${platforms.length!==1?'s':''} instead of spreading thin across every channel.`;

  const biggestMistake = weakPlatform
    ? `Including ${weakPlatform.key} stretched effort into a channel that isn't where this audience actually spends attention.`
    : (chosen.quality!=='good'
        ? `The response to "${event.title}" — ${chosen.label.toLowerCase()} — cost more trust than it needed to.`
        : `No major misstep this round — the next challenge is staying consistent long enough for compounding to kick in.`);

  const lessonsPersonal = [
    'Authenticity beats polish — audiences follow a consistent, specific voice more than a perfect one.',
    'Consistency compounds. A recognizable pattern of showing up matters more than any single viral moment.',
    'Niche clarity is a filter, not a limitation — being specific about who you\'re for is what makes you findable at all.',
  ];
  const lessonsBusiness = [
    'A product doesn\'t sell itself — the story around it decides who notices it at all.',
    'Picking the right two platforms beats being mediocre on five.',
    'A crisis handled in public, honestly, usually builds more trust than it costs.',
  ];
  const lessons = mode==='personal' ? lessonsPersonal : lessonsBusiness;

  return (
    <div className="fade-in">
      <div className="card">
        <p className="eyebrow">Final Report</p>
        <h2 className="title">Growth Report — {brand.name || 'Your Brand'}</h2>
        <p className="lead">Here's how the choices you made throughout this simulation add up.</p>

        <div style={{marginTop:20}}>
          <div className="rc-label" style={{fontFamily:'var(--mono)',fontSize:10.5,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--muted-2)'}}>Growth Potential</div>
          <div className="score-wrap" style={{marginTop:8}}>
            <div className="score-num">{score}</div>
            <div style={{flex:1}}>
              <div className="score-bar"><div className="score-fill" style={{width:score+'%'}}></div></div>
              <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--mint)', marginTop:6}}>{rating}</div>
            </div>
          </div>
        </div>

        <div className="report-grid" style={{marginTop:22}}>
          <div className="report-cell">
            <div className="rc-label">Audience Understanding</div>
            <div style={{fontSize:14, lineHeight:1.6}}>{brand.audience || 'Not specified'}</div>
          </div>
          <div className="report-cell">
            <div className="rc-label">Platform Strategy</div>
            <div className="pill-list" style={{marginTop:0}}>{platforms.map(p=><span className="pill" key={p}>{p}</span>)}</div>
          </div>
          <div className="report-cell">
            <div className="rc-label">Content Strategy</div>
            <div className="pill-list" style={{marginTop:0}}>{pillars.map(p=><span className="pill" key={p.name}>{p.name}</span>)}</div>
          </div>
          <div className="report-cell">
            <div className="rc-label">Curveball Response</div>
            <div style={{fontSize:14, lineHeight:1.6}}>{event.title}: <i>{chosen.label}</i></div>
          </div>
          <div className="report-cell best">
            <div className="rc-label">Best Decision</div>
            <div style={{fontSize:14, lineHeight:1.6}}>{bestDecision}</div>
          </div>
          <div className="report-cell mistake">
            <div className="rc-label">Biggest Mistake</div>
            <div style={{fontSize:14, lineHeight:1.6}}>{biggestMistake}</div>
          </div>
        </div>

        <div style={{marginTop:22}}>
          <div className="rc-label" style={{fontFamily:'var(--mono)',fontSize:10.5,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--muted-2)'}}>Three Marketing Lessons</div>
          <ul className="lessons-list">
            {lessons.map((l,i)=>(<li key={i}><span className="lnum">0{i+1}</span><span>{l}</span></li>))}
          </ul>
        </div>

        <div className="replay-row">
          <button className="btn" onClick={onReplay}>↻ Replay With a Different Brand</button>
        </div>
      </div>
      <PromptCard label="Reflecting & Iterating" prompt={
`Review my marketing strategy simulation results for ${brand.name||'[brand]'}:
- Platforms: ${platforms.join(', ')}
- Content pillars: ${pillars.map(p=>p.name).join(', ')}
- Curveball I faced: ${event.title} → I chose: "${chosen.label}"

Give me:
1. One thing you'd change about my strategy and why
2. One risk you see in my plan that I might be missing
3. A single next action I could take this week to test the plan for real`
      } />
    </div>
  );
}

/* ---------------- APP ---------------- */

function App(){
  const [screenIdx, setScreenIdx] = useState(0); // index into STEPS
  const [mode, setMode] = useState(null);
  const [brand, setBrand] = useState({name:'', industry:'', niche:'', description:'', audience:'', budget:'Small ($0-1,500/mo)', competitors:[], challenge:''});
  const [platforms, setPlatforms] = useState([]);
  const [pillars, setPillars] = useState([]);
  const [roadmap, setRoadmap] = useState(null);
  const [event, setEvent] = useState(null);
  const [eventChoice, setEventChoice] = useState(null);

  const pickMode = (m)=>{
    setMode(m);
    if(m==='random'){
      const c = randomOf(RANDOM_CLIENTS);
      setBrand({...c});
    } else {
      setBrand({name:'', industry:'', niche:'', description:'', audience:'', budget:'Small ($0-1,500/mo)', competitors:[], challenge:''});
    }
    setScreenIdx(2);
  };

  const rerollRandom = ()=>{
    const c = randomOf(RANDOM_CLIENTS);
    setBrand({...c});
  };

  const goToPlatforms = (b)=>{ setBrand(b); setScreenIdx(3); };
  const goToPillars = ()=> setScreenIdx(4);
  const goToRoadmap = ()=>{
    setRoadmap(buildRoadmap(mode, pillars, platforms, brand.name));
    setScreenIdx(5);
  };
  const goToEvent = ()=>{
    const pool = mode==='personal' ? EVENTS_PERSONAL : EVENTS_BUSINESS;
    setEvent(randomOf(pool));
    setEventChoice(null);
    setScreenIdx(6);
  };
  const goToReport = ()=> setScreenIdx(7);

  const replay = ()=>{
    setMode(null);
    setBrand({name:'', industry:'', niche:'', description:'', audience:'', budget:'Small ($0-1,500/mo)', competitors:[], challenge:''});
    setPlatforms([]); setPillars([]); setRoadmap(null); setEvent(null); setEventChoice(null);
    setScreenIdx(1);
  };

  const screenKey = STEPS[screenIdx].key;

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="brandmark"><span className="dot"></span> Marketing Strategist Simulator</div>
        <div className="session-tag">{mode ? (mode==='personal'?'PERSONAL BRAND MODE':mode==='random'?'CLIENT MODE':'BUSINESS MODE') : 'NO SESSION'}</div>
      </div>

      {screenIdx>0 && <StepRail activeIndex={screenIdx} />}

      {screenKey==='welcome' && <Welcome onStart={()=>setScreenIdx(1)} />}
      {screenKey==='mode' && <ModeSelect onPick={pickMode} />}
      {screenKey==='setup' && (
        <SetupScreen mode={mode} brand={brand} setBrand={setBrand} onContinue={goToPlatforms} rerollRandom={rerollRandom} />
      )}
      {screenKey==='platforms' && (
        <PlatformsScreen mode={mode} brand={brand} selected={platforms} setSelected={setPlatforms} onContinue={goToPillars} onBack={()=>setScreenIdx(2)} />
      )}
      {screenKey==='pillars' && (
        <PillarsScreen mode={mode} brand={brand} selected={pillars} setSelected={setPillars} onContinue={goToRoadmap} onBack={()=>setScreenIdx(3)} />
      )}
      {screenKey==='roadmap' && roadmap && (
        <RoadmapScreen mode={mode} brand={brand} pillars={pillars} platforms={platforms} roadmap={roadmap} onContinue={goToEvent} onBack={()=>setScreenIdx(4)} />
      )}
      {screenKey==='event' && event && (
        <EventScreen mode={mode} brand={brand} event={event} choiceIdx={eventChoice} setChoiceIdx={setEventChoice} onContinue={goToReport} onBack={()=>setScreenIdx(5)} />
      )}
      {screenKey==='report' && event && eventChoice!=null && (
        <ReportScreen mode={mode} brand={brand} platforms={platforms} pillars={pillars} roadmap={roadmap} event={event} eventChoice={eventChoice} onReplay={replay} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
